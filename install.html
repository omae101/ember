<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ember · Start</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#E7EDE6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Ember">
<link rel="apple-touch-icon" href="/icon-192.png">
<style>
  :root{ --ground:#E7EDE6; --ground2:#DCE6DC; --card:#FCFDFB; --ink:#20302A; --ink-soft:#7C8D84; --hair:#D8E1D8;
    --coral:#FF6A3D; --did:#0E9E63; --did-soft:#DCF1E6; --dont:#9A6B8F; --dont-soft:#F1E7EF;
    --font:"Apple SD Gothic Neo","Pretendard","Malgun Gothic",system-ui,sans-serif; }
  @media (prefers-color-scheme:dark){
    :root{ --ground:#14201A; --ground2:#1B291F; --card:#1C2620; --ink:#E9F0EA; --ink-soft:#93A69A; --hair:#2C3A30;
      --coral:#FF7A4D; --did:#39C489; --did-soft:#123020; --dont:#C08FB4; --dont-soft:#2E2230; } }
  *{ box-sizing:border-box; margin:0; padding:0; font-family:var(--font); -webkit-tap-highlight-color:transparent; }
  body{ background:radial-gradient(120% 55% at 50% 0%, var(--ground2), var(--ground)); color:var(--ink); min-height:100dvh; overflow:hidden; }
  .deck{ position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:calc(20px + env(safe-area-inset-top)) 26px calc(26px + env(safe-area-inset-bottom)); text-align:center; }
  .langwrap{ position:absolute; top:calc(14px + env(safe-area-inset-top)); right:16px; }
  .langsel{ border:1px solid var(--hair); background:var(--card); color:var(--ink-soft); font-family:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer; }

  .slide{ display:none; flex-direction:column; align-items:center; max-width:360px; width:100%; }
  .slide.on{ display:flex; animation:slidein .45s cubic-bezier(.2,.9,.3,1) both; }
  @keyframes slidein{ from{opacity:0; transform:translateY(16px);} to{opacity:1; transform:none;} }

  .art{ width:210px; height:200px; position:relative; display:flex; align-items:center; justify-content:center; margin:0 auto 6px; }
  .flame{ width:130px; height:130px; transform-origin:50% 82%; }
  .idle{ animation:idle 3.4s ease-in-out infinite; }
  @keyframes idle{ 0%,100%{transform:scale(1) rotate(-1deg);} 50%{transform:scale(1.05) rotate(1.5deg);} }
  .grow{ animation:grow 3.6s ease-in-out infinite; }
  @keyframes grow{ 0%{transform:scale(.6);} 26%{transform:scale(.8);} 54%{transform:scale(1.0);} 78%{transform:scale(1.24);} 86%{transform:scale(1.13);} 100%{transform:scale(.6);} }
  .chk{ position:absolute; left:50%; bottom:4px; transform:translateX(-50%); font-size:13px; font-weight:800; color:var(--did); background:var(--did-soft); padding:5px 13px; border-radius:999px; white-space:nowrap; animation:chk 3.6s ease-in-out infinite; }
  @keyframes chk{ 0%,14%{opacity:0; transform:translateX(-50%) translateY(6px);} 26%{opacity:1; transform:translateX(-50%);} 74%{opacity:1;} 88%,100%{opacity:0;} }
  .hat{ position:absolute; top:2px; left:50%; font-size:40px; opacity:0; animation:hat 3.6s ease-in-out infinite; }
  @keyframes hat{ 0%,40%{opacity:0; transform:translate(-50%,-16px) rotate(-14deg);} 56%{opacity:1; transform:translate(-50%,0) rotate(0);} 100%{opacity:1; transform:translate(-50%,0);} }
  .spark{ position:absolute; font-size:20px; opacity:0; animation:spark 2.4s ease-in-out infinite; }
  .spark.s1{ top:24px; left:30px; animation-delay:.1s; } .spark.s2{ top:40px; right:24px; animation-delay:.7s; } .spark.s3{ bottom:44px; left:40px; animation-delay:1.3s; }
  @keyframes spark{ 0%,100%{opacity:0; transform:scale(.5);} 40%{opacity:1; transform:scale(1.1);} }
  .acc{ position:absolute; left:50%; pointer-events:none; z-index:3; }
  .acc.crown{ top:2px; transform:translateX(-50%); font-size:44px; animation:accbob 3s ease-in-out infinite; }
  .acc.star{ left:auto; right:38px; top:12px; font-size:28px; animation:twinkle 1.8s ease-in-out infinite; }
  .glow{ position:absolute; left:50%; top:50%; width:170px; height:170px; margin:-85px 0 0 -85px; border-radius:50%; background:radial-gradient(circle, rgba(255,150,60,.45), transparent 62%); z-index:0; animation:twinkle 2.8s ease-in-out infinite; }
  @keyframes accbob{ 0%,100%{transform:translateX(-50%) translateY(0);} 50%{transform:translateX(-50%) translateY(-3px);} }
  @keyframes twinkle{ 0%,100%{opacity:.5;} 50%{opacity:1;} }
  .xp{ width:190px; height:12px; border-radius:999px; background:var(--hair); overflow:hidden; margin:2px auto 14px; }
  .xp i{ display:block; height:100%; border-radius:999px; background:linear-gradient(90deg,#FFB24D,var(--coral)); animation:xpfill 3.6s ease-in-out infinite; }
  @keyframes xpfill{ 0%{width:6%;} 54%{width:100%;} 100%{width:100%;} }
  .lvpop{ display:inline-block; font-size:12px; font-weight:900; color:#fff; background:var(--coral); padding:3px 11px; border-radius:999px; margin-bottom:10px; }

  .brand{ font-size:30px; font-weight:900; letter-spacing:-.03em; } .brand b{ color:var(--coral); }
  h2.t{ font-size:22px; font-weight:900; letter-spacing:-.03em; text-wrap:balance; } h2.t b{ color:var(--coral); }
  .lead{ font-size:14.5px; color:var(--ink-soft); line-height:1.65; margin-top:11px; text-wrap:balance; }
  .twowin{ display:flex; gap:10px; margin-top:20px; width:100%; }
  .win{ flex:1; border-radius:14px; padding:14px 8px; font-size:14px; font-weight:800; display:flex; flex-direction:column; align-items:center; gap:6px; }
  .win span{ font-size:22px; }
  .win.did{ background:var(--did-soft); color:var(--did); } .win.dont{ background:var(--dont-soft); color:var(--dont); }

  .ins{ width:100%; margin-top:16px; }
  .ins.hide{ display:none; }
  .step{ display:flex; gap:11px; align-items:center; font-size:14px; text-align:left; margin:10px 2px; }
  .step .n{ flex:none; width:24px; height:24px; border-radius:50%; background:var(--coral); color:#fff; font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center; }
  .step b{ color:var(--ink); }
  .warn{ background:#FFF4E5; border:1px solid #FFD699; border-radius:14px; padding:15px; color:#8A5A00; font-size:14px; line-height:1.6; text-align:left; }
  @media (prefers-color-scheme:dark){ .warn{ background:#2E2413; border-color:#4A3A17; color:#E4B45A; } }
  .warn b{ color:#B5462A; }
  .manual{ color:var(--ink-soft); font-size:13px; margin-top:12px; line-height:1.6; }

  .dots{ display:flex; gap:8px; margin-top:30px; }
  .dots i{ width:8px; height:8px; border-radius:50%; background:var(--hair); transition:width .25s, background .25s; }
  .dots i.on{ background:var(--coral); width:22px; border-radius:999px; }
  .cta{ margin-top:20px; border:none; background:var(--coral); color:#fff; font-family:inherit; font-size:16px; font-weight:800; padding:15px 46px; border-radius:16px; cursor:pointer; box-shadow:0 14px 30px -12px var(--coral); }
  .cta:active{ transform:translateY(1px); }
  .skip{ margin-top:13px; background:none; border:none; color:var(--ink-soft); font-size:13px; font-weight:600; cursor:pointer; }
  @media (prefers-reduced-motion:reduce){ *{animation:none !important;} }
</style>
</head>
<body>
<div class="deck" id="deck">
  <div class="langwrap"><select class="langsel" id="langSel"></select></div>

  <!-- 1) 컨셉 -->
  <section class="slide on" data-i="0">
    <div class="art">
      <svg class="flame idle" viewBox="0 0 100 100"><defs><radialGradient id="fg" cx="50%" cy="72%" r="70%"><stop offset="0" stop-color="#FFDF6B"/><stop offset="45%" stop-color="#FF9A3C"/><stop offset="100%" stop-color="#F0492A"/></radialGradient></defs><path d="M50 12 C62 26 78 34 78 56 A28 22 0 0 1 22 56 C22 36 36 30 41 20 C45 30 43 40 50 40 C57 40 55 24 50 12 Z" fill="url(#fg)"/><ellipse cx="42" cy="57" rx="4.8" ry="6" fill="#2E1A12"/><ellipse cx="58" cy="57" rx="4.8" ry="6" fill="#2E1A12"/><circle cx="44" cy="54" r="2" fill="#fff"/><circle cx="60" cy="54" r="2" fill="#fff"/><circle cx="33.5" cy="63" r="3" fill="#FF7A5A" opacity=".45"/><circle cx="66.5" cy="63" r="3" fill="#FF7A5A" opacity=".45"/><path d="M43 64 Q50 73 57 64 Z" fill="#7A2A18"/></svg>
    </div>
    <div class="brand"><b>Ember</b></div>
    <p class="lead" id="s0lead"></p>
    <div class="twowin">
      <div class="win did"><span>✓</span><b id="s0did"></b></div>
      <div class="win dont"><span>🛡</span><b id="s0dont"></b></div>
    </div>
  </section>

  <!-- 2) 게임: 키우기 -->
  <section class="slide" data-i="1">
    <div class="art">
      <svg class="flame grow" viewBox="0 0 100 100"><path d="M50 12 C62 26 78 34 78 56 A28 22 0 0 1 22 56 C22 36 36 30 41 20 C45 30 43 40 50 40 C57 40 55 24 50 12 Z" fill="url(#fg)"/><ellipse cx="42" cy="57" rx="4.8" ry="6" fill="#2E1A12"/><ellipse cx="58" cy="57" rx="4.8" ry="6" fill="#2E1A12"/><circle cx="44" cy="54" r="2" fill="#fff"/><circle cx="60" cy="54" r="2" fill="#fff"/><path d="M43 64 Q50 72 57 64 Z" fill="#7A2A18"/></svg>
      <span class="acc star">⭐</span>
      <span class="chk" id="s1chk"></span>
    </div>
    <div class="xp"><i></i></div>
    <span class="lvpop" id="s1lv"></span>
    <h2 class="t" id="s1title"></h2>
    <p class="lead" id="s1lead"></p>
  </section>

  <!-- 3) 게임: 진화·꾸미기 -->
  <section class="slide" data-i="2">
    <div class="art">
      <span class="spark s1">✨</span><span class="spark s2">⭐</span><span class="spark s3">✨</span>
      <span class="hat">🎩</span>
      <svg class="flame grow" viewBox="0 0 100 100" style="animation-duration:3.6s"><path d="M50 12 C62 26 78 34 78 56 A28 22 0 0 1 22 56 C22 36 36 30 41 20 C45 30 43 40 50 40 C57 40 55 24 50 12 Z" fill="url(#fg)"/><ellipse cx="42" cy="57" rx="4.8" ry="6" fill="#2E1A12"/><ellipse cx="58" cy="57" rx="4.8" ry="6" fill="#2E1A12"/><circle cx="44" cy="54" r="2" fill="#fff"/><circle cx="60" cy="54" r="2" fill="#fff"/><path d="M41 63 Q50 74 59 63 Z" fill="#7A2A18"/></svg>
    </div>
    <h2 class="t" id="s2title"></h2>
    <p class="lead" id="s2lead"></p>
  </section>

  <!-- 4) 설치/시작 -->
  <section class="slide" data-i="3">
    <div class="art" style="height:150px;">
      <span class="glow"></span>
      <span class="spark s1">✨</span><span class="spark s2">⭐</span><span class="spark s3">✨</span>
      <span class="acc crown">👑</span>
      <svg class="flame idle" viewBox="0 0 100 100" style="width:104px;height:104px;"><path d="M50 12 C62 26 78 34 78 56 A28 22 0 0 1 22 56 C22 36 36 30 41 20 C45 30 43 40 50 40 C57 40 55 24 50 12 Z" fill="url(#fg)"/><ellipse cx="42" cy="57" rx="4.8" ry="6" fill="#2E1A12"/><ellipse cx="58" cy="57" rx="4.8" ry="6" fill="#2E1A12"/><circle cx="44" cy="54" r="2" fill="#fff"/><circle cx="60" cy="54" r="2" fill="#fff"/><path d="M43 64 Q50 73 57 64 Z" fill="#7A2A18"/></svg>
    </div>
    <h2 class="t" id="s3title"></h2>
    <div class="ins hide" id="insInapp"><div class="warn" id="s3inapp"></div></div>
    <div class="ins hide" id="insAndroid"><div class="manual" id="s3andManual"></div></div>
    <div class="ins hide" id="insIos">
      <div class="step"><span class="n">1</span><div id="s3ios1"></div></div>
      <div class="step"><span class="n">2</span><div id="s3ios2"></div></div>
      <div class="step"><span class="n">3</span><div id="s3ios3"></div></div>
    </div>
    <div class="ins hide" id="insOther"><div class="manual" id="s3other"></div></div>
  </section>

  <div class="dots" id="dots"><i class="on"></i><i></i><i></i><i></i></div>
  <button class="cta" id="cta" type="button"></button>
  <button class="skip" id="skip" type="button"></button>
</div>

<script>
  var T = {
    ko:{ name:'한국어',
      s0lead:'불꽃이와 함께 좋은 습관은 해내고, 나쁜 습관은 참아요. 둘 다 승리예요 🔥',
      s0did:'해냈다', s0dont:'참았다',
      s1chk:'✓ 완료 +10', s1lv:'Lv.1 → Lv.2',
      s1title:'할수록 <b>불꽃이가 자라요</b>', s1lead:'하나씩 해낼 때마다 불씨가 쑥쑥.\n레벨이 오르고 불꽃으로 진화해요.',
      s2title:'퀘스트 깨고 <b>꾸며요</b>', s2lead:'꾸준히 채우면 퀘스트 클리어!\n모자·아이템으로 나만의 불꽃이를 완성해요 🎩',
      s3title:'<b>홈 화면에 추가</b>하고 시작 🔥',
      s3inapp:'⚠️ 지금 <b>앱 안의 브라우저</b>예요. 여기선 설치가 안 돼요.<br>오른쪽 위 <b>⋯</b> → <b>"다른 브라우저로 열기"</b> 후 다시 오세요.',
      s3andManual:'크롬 메뉴 <b>⋮</b> → <b>"홈 화면에 추가"</b> → 추가 하면 앱처럼 설치돼요.',
      s3ios1:'아래 가운데 <b>공유 ⬆️</b> 누르기', s3ios2:'<b>"홈 화면에 추가"</b> 선택', s3ios3:'오른쪽 위 <b>"추가"</b> → 끝!',
      s3other:'크롬 주소창의 <b>설치 아이콘</b>을 누르거나, 아래 버튼으로 바로 시작하세요.',
      next:'다음 →', start:'시작하기 🔥', skip:'건너뛰고 바로 쓰기' },
    en:{ name:'English',
      s0lead:'With Ember, do the good and resist the bad. Both are wins 🔥',
      s0did:'Did it', s0dont:'Resisted',
      s1chk:'✓ Done +10', s1lv:'Lv.1 → Lv.2',
      s1title:'Your <b>flame grows</b> as you win', s1lead:'Every win makes it bigger.\nLevel up and evolve your flame.',
      s2title:'Clear quests & <b>customize</b>', s2lead:'Keep it up to clear quests!\nDress your flame with hats & items 🎩',
      s3title:'<b>Add to Home Screen</b> & start 🔥',
      s3inapp:'⚠️ You\'re in an <b>in-app browser</b>. Install won\'t work here.<br>Tap <b>⋯</b> (top right) → <b>"Open in browser"</b>, then come back.',
      s3andManual:'Chrome menu <b>⋮</b> → <b>"Add to Home screen"</b> → Add to install like an app.',
      s3ios1:'Tap <b>Share ⬆️</b> at the bottom', s3ios2:'Choose <b>"Add to Home Screen"</b>', s3ios3:'Tap <b>"Add"</b> (top right) — done!',
      s3other:'Click the <b>install icon</b> in Chrome\'s address bar, or start with the button below.',
      next:'Next →', start:'Start 🔥', skip:'Skip & use now' }
  };
  var LANG=(function(){ try{ var s=localStorage.getItem('ember_lang'); if(s&&T[s])return s; }catch(e){} return (navigator.language||'en').toLowerCase().indexOf('ko')===0?'ko':'en'; })();
  function $(id){ return document.getElementById(id); }
  function setHTML(id,v){ var e=$(id); if(e)e.innerHTML=v; }

  function apply(){
    var d=T[LANG]; document.documentElement.lang=LANG;
    ['s0lead','s0did','s0dont','s1chk','s1lv','s1title','s1lead','s2title','s2lead','s3title',
     's3inapp','s3andManual','s3ios1','s3ios2','s3ios3','s3other'].forEach(function(k){ setHTML(k, d[k]); });
    // 슬라이드 내 개행 처리
    $('s1lead').innerHTML=d.s1lead.replace(/\n/g,'<br>');
    $('s2lead').innerHTML=d.s2lead.replace(/\n/g,'<br>');
    renderCta();
  }

  // 언어 셀렉트
  (function(){
    var sel=$('langSel');
    for(var k in T){ var o=document.createElement('option'); o.value=k; o.textContent=T[k].name; if(k===LANG)o.selected=true; sel.appendChild(o); }
    sel.addEventListener('change',function(){ LANG=sel.value; try{localStorage.setItem('ember_lang',LANG);}catch(e){} apply(); });
  })();

  // 슬라이드 네비게이션
  var slides=document.querySelectorAll('.slide'), dots=$('dots').children, cur=0, last=slides.length-1;
  function go(i){ if(i<0||i>last)return; slides[cur].classList.remove('on'); dots[cur].classList.remove('on');
    cur=i; slides[cur].classList.add('on'); dots[cur].classList.add('on'); renderCta(); }
  function renderCta(){ $('cta').textContent = (cur===last)? T[LANG].start : T[LANG].next; $('skip').textContent=T[LANG].skip; }
  var deferredPrompt=null;
  window.addEventListener('beforeinstallprompt',function(e){ e.preventDefault(); deferredPrompt=e; });
  function finish(){ location.replace('/'); }
  $('cta').addEventListener('click',function(){
    if(cur!==last){ go(cur+1); return; }
    if(deferredPrompt){ deferredPrompt.prompt(); deferredPrompt.userChoice.finally(function(){ deferredPrompt=null; finish(); }); }
    else { finish(); }
  });
  $('skip').addEventListener('click',finish);

  // 스와이프
  var x0=null;
  document.getElementById('deck').addEventListener('touchstart',function(e){ x0=e.touches[0].clientX; },{passive:true});
  document.getElementById('deck').addEventListener('touchend',function(e){ if(x0===null)return; var dx=e.changedTouches[0].clientX-x0; if(dx<-45)go(cur+1); else if(dx>45)go(cur-1); x0=null; },{passive:true});

  // 마지막 슬라이드: 기기별 설치 안내
  (function(){
    var ua=navigator.userAgent||'';
    var isInApp=/Instagram|FBAN|FBAV|KAKAOTALK|NAVER|Line|DaumApps/i.test(ua);
    var isIOS=/iPhone|iPad|iPod/i.test(ua);
    var isAndroid=/Android/i.test(ua);
    var standalone=window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone===true;
    if(standalone){ location.replace('/'); return; }
    function show(id){ var e=$(id); if(e)e.classList.remove('hide'); }
    if(isInApp) show('insInapp');
    else if(isIOS) show('insIos');
    else if(isAndroid) show('insAndroid');
    else show('insOther');
  })();

  apply();
  if('serviceWorker' in navigator){ navigator.serviceWorker.register('/sw.js').catch(function(){}); }
</script>
</body>
</html>
