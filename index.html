<style>
  :root{
    --ground:#E7EDE6; --ground2:#DCE6DC; --card:#FCFDFB; --ink:#20302A; --ink-soft:#7C8D84; --hair:#D8E1D8;
    --coral:#FF6A3D; --did:#0E9E63; --did-soft:#DCF1E6; --dont:#9A6B8F; --dont-soft:#F1E7EF; --gold:#C9902F; --gold-soft:#F4EAD6; --water:#4E97C4;

  }

    :root{ --ground:#14201A; --ground2:#1B291F; --card:#1C2620; --ink:#E9F0EA; --ink-soft:#93A69A; --hair:#2C3A30;
      --coral:#FF7A4D; --did:#39C489; --did-soft:#123020; --dont:#C08FB4; --dont-soft:#2E2230; --gold:#E4B45A; --gold-soft:#322813; --water:#6FB4DE; }
  }
  :root[data-theme="light"]{ --ground:#E7EDE6; --ground2:#DCE6DC; --card:#FCFDFB; --ink:#20302A; --ink-soft:#7C8D84; --hair:#D8E1D8; --coral:#FF6A3D; --did:#0E9E63; --did-soft:#DCF1E6; --dont:#9A6B8F; --dont-soft:#F1E7EF; --gold:#C9902F; --gold-soft:#F4EAD6; }
  :root[data-theme="dark"]{ --ground:#14201A; --ground2:#1B291F; --card:#1C2620; --ink:#E9F0EA; --ink-soft:#93A69A; --hair:#2C3A30; --coral:#FF7A4D; --did:#39C489; --did-soft:#123020; --dont:#C08FB4; --dont-soft:#2E2230; --gold:#E4B45A; --gold-soft:#322813; }
  *{box-sizing:border-box;} html,body{margin:0;}
  body{ font-family:var(--font); color:var(--ink); background:radial-gradient(120% 46% at 50% -6%, var(--ground2), transparent 62%), var(--ground); -webkit-font-smoothing:antialiased; min-height:100dvh; }
  .wrap{ max-width:440px; margin:0 auto; padding:28px 22px calc(44px + env(safe-area-inset-bottom)); }
  .top{display:flex; align-items:center; justify-content:space-between; gap:8px;}

  .topr{display:flex; align-items:center; gap:8px;}
  .langsel{border:1px solid var(--hair); background:var(--card); color:var(--ink-soft); font-family:inherit; font-size:12px; font-weight:700; padding:6px 8px; border-radius:999px; cursor:pointer;}
  .helpbtn{width:28px; height:28px; border-radius:999px; border:1px solid var(--hair); background:var(--card); color:var(--ink-soft); font-family:inherit; font-size:14px; font-weight:800; cursor:pointer; flex:none;}

  .pts .n{font-family:var(--num); font-variant-numeric:tabular-nums; color:var(--coral);}

  .hero{margin-top:14px; text-align:center; padding-bottom:6px;}

  #masc.pop{animation:pop .5s cubic-bezier(.2,1.5,.4,1);}
  @keyframes pop{0%{}35%{transform:scale(var(--s,1)) translateY(-5px) rotate(-4deg);}70%{transform:scale(calc(var(--s,1)*.97)) rotate(2deg);}100%{}}
  .lvrow{margin-top:8px; display:inline-flex; align-items:center; gap:6px;}
  .lvnum{font-family:var(--num); font-size:11px; font-weight:900; letter-spacing:.03em; color:#fff; background:var(--coral); padding:2px 8px; border-radius:999px;}
  .lvname{font-size:13px; font-weight:800; color:var(--ink); letter-spacing:-.01em;}
  .xpwrap{margin:11px auto 0; max-width:230px;}
  .xpbar{height:8px; border-radius:999px; background:var(--hair); overflow:hidden;}
  .xpfill{height:100%; border-radius:999px; background:linear-gradient(90deg,#FFB24D,var(--coral)); width:0; transition:width .55s cubic-bezier(.2,.8,.2,1);}
  .xptxt{margin-top:6px; font-size:11px; font-weight:600; color:var(--ink-soft);}
  .streak2{margin-top:13px; font-size:13.5px; font-weight:800; color:var(--ink-soft);} .streak2 b{color:var(--coral); font-family:var(--num); font-variant-numeric:tabular-nums;}

  .did .tag{color:var(--did); background:var(--did-soft);} .dont .tag{color:var(--dont); background:var(--dont-soft);}

  .item{display:flex; align-items:center; gap:14px; background:var(--card); border:1px solid var(--hair); border-radius:16px; padding:16px; margin-bottom:11px; transition:transform .12s, border-color .18s;}

  .item:active{transform:scale(.99);}
  .box{width:26px; height:26px; border-radius:9px; border:2px solid var(--hair); flex:none; display:flex; align-items:center; justify-content:center; color:#fff; transition:background .18s, border-color .18s;}

  .did .item.on .box{background:var(--did); border-color:var(--did);} .did .item.on{border-color:color-mix(in srgb,var(--did) 40%,var(--hair));}

  .plus{font-size:12px; font-weight:800; color:var(--ink-soft);} .item.on .plus{color:var(--did);}

  .del{background:none; border:none; color:var(--ink-soft); font-size:16px; opacity:.4; cursor:pointer; padding:2px 4px; flex:none;}

  .qcard{background:var(--card); border:1px solid var(--hair); border-radius:16px; padding:16px 16px 15px; margin-bottom:11px;}
  .qtop{display:flex; align-items:baseline; gap:10px;}
  .qname{font-size:15px; font-weight:700; letter-spacing:-.01em; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; cursor:pointer;}
  .qmeta{font-size:12px; color:var(--ink-soft); white-space:nowrap;} .qmeta .d{font-family:var(--num); font-variant-numeric:tabular-nums; font-size:16px; font-weight:900; color:var(--dont);}
  .qedit{margin-top:9px; font-size:12px; color:var(--ink-soft); display:flex; align-items:center; gap:6px;}
  .qedit .ue{background:none; border:none; font-size:15px; cursor:pointer; padding:0; line-height:1;}
  .qedit .edit,.qedit .qdel{background:none; border:none; color:var(--ink-soft); font-size:13px; cursor:pointer; padding:0 2px; opacity:.55;}
  .qedit .qdel{margin-left:auto;}
  .qbtn{margin-top:12px; width:100%; padding:12px; border-radius:12px; border:none; font-family:inherit; font-size:14px; font-weight:800; cursor:pointer; background:var(--dont-soft); color:var(--dont); transition:transform .12s, background .18s;}
  .qbtn:active{transform:scale(.98);} .qbtn.done{background:var(--dont); color:#fff;}

  .add{width:100%; padding:13px; border-radius:14px; border:1.5px dashed var(--hair); background:transparent; color:var(--ink-soft); font-family:inherit; font-size:13.5px; font-weight:700; cursor:pointer; margin-top:2px;}
  .add:active{transform:scale(.99);}

  .saved{background:linear-gradient(165deg, var(--gold-soft), var(--card) 74%); border:1px solid var(--hair); border-radius:18px; padding:17px 17px 16px; margin-top:14px;}
  .saved .sh{font-size:13px; font-weight:800; color:var(--ink-soft);}
  .saved .srow{margin-top:9px; display:flex; gap:16px; flex-wrap:wrap; font-size:15px; font-weight:800;} .saved .srow b{font-family:var(--num); font-variant-numeric:tabular-nums;}
  .track{margin-top:13px; height:10px; border-radius:999px; background:var(--hair); overflow:hidden;} .fill{height:100%; border-radius:999px; background:linear-gradient(90deg,#E1B05A,var(--gold)); width:0; transition:width .5s cubic-bezier(.2,.8,.2,1);}
  .goal{margin-top:8px; font-size:11.5px; color:var(--ink-soft); display:flex; justify-content:space-between;}
  .gift{margin-top:12px; width:100%; padding:11px; border-radius:12px; border:none; font-family:inherit; font-size:14px; font-weight:800; background:var(--gold); color:#fff; cursor:pointer; display:none;} .gift.on{display:block;}

  .cal{margin-top:14px; background:var(--card); border:1px solid var(--hair); border-radius:18px; padding:16px 16px 14px;}
  .cal-h{font-size:13px; font-weight:800; color:var(--ink-soft); margin-bottom:12px;}
  .cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:6px; text-align:center;}
  .cal-wd{font-size:10px; font-weight:700; color:var(--ink-soft); padding-bottom:2px;}
  .cal-d{aspect-ratio:1; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; border-radius:9px; color:var(--ink-soft);}
  .cal-d.on{background:var(--coral); color:#fff;}
  .cal-d.today{box-shadow:inset 0 0 0 2px var(--coral); color:var(--coral);}
  .cal-d.on.today{color:#fff; box-shadow:inset 0 0 0 2px rgba(255,255,255,.85);}
  .rest{margin-top:14px; text-align:center;}
  .restbtn{background:var(--card); border:1px solid var(--hair); border-radius:999px; padding:9px 16px; font-family:inherit; font-size:12.5px; font-weight:700; color:var(--water); cursor:pointer;}
  .foot{margin-top:24px; text-align:center; font-size:12px; color:var(--ink-soft); line-height:1.7;}
  .float{position:fixed; font-family:var(--num); font-weight:900; font-size:20px; pointer-events:none; z-index:60;}
  @keyframes floatUp{0%{opacity:0; transform:translateY(0) scale(.7);}20%{opacity:1;}100%{opacity:0; transform:translateY(-46px) scale(1.1);}}
  @media (prefers-reduced-motion:reduce){ *{animation:none !important; transition:none !important;} .float{display:none;} }

  .intro{position:fixed; inset:0; z-index:200; background:radial-gradient(120% 60% at 50% 0%, var(--ground2), var(--ground)); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 26px calc(30px + env(safe-area-inset-bottom)); text-align:center;}
  .intro.hide{display:none;}
  .islide{display:none; flex-direction:column; align-items:center; max-width:340px;}
  .islide.on{display:flex; animation:islidein .45s ease both;}
  @keyframes islidein{from{opacity:0; transform:translateY(12px);}to{opacity:1; transform:none;}}
  .idemo{width:200px; height:190px; position:relative; display:flex; align-items:center; justify-content:center; margin:0 auto;}
  .dflame{width:118px; height:118px; transform-origin:50% 82%;}
  .ititle{font-size:21px; font-weight:900; letter-spacing:-.03em; margin-top:12px; text-wrap:balance;} .ititle b{color:var(--coral);}
  .idesc{font-size:14px; color:var(--ink-soft); line-height:1.65; margin-top:11px;}
  .idots{display:flex; gap:7px; margin-top:28px;}
  .idots i{width:7px; height:7px; border-radius:50%; background:var(--hair); transition:width .25s, background .25s;} .idots i.on{background:var(--coral); width:20px; border-radius:999px;}
  .ibtn{margin-top:22px; border:none; background:var(--coral); color:#fff; font-family:inherit; font-size:15px; font-weight:800; padding:14px 42px; border-radius:16px; cursor:pointer; box-shadow:0 14px 28px -12px var(--coral);}
  .iskip{margin-top:12px; background:none; border:none; color:var(--ink-soft); font-size:12.5px; font-weight:600; cursor:pointer;}
  .chk{position:absolute; left:50%; bottom:6px; transform:translateX(-50%); font-size:13px; font-weight:800; color:var(--did); background:var(--did-soft); padding:4px 12px; border-radius:999px; animation:ochk 3.2s ease-in-out infinite; white-space:nowrap;}
  .g1{animation:ogrow1 3.2s ease-in-out infinite;}
  @keyframes ogrow1{0%{transform:scale(.62)}25%{transform:scale(.8)}52%{transform:scale(.98)}76%{transform:scale(1.2)}82%{transform:scale(1.1)}100%{transform:scale(.62)}}
  @keyframes ochk{0%,12%{opacity:0; transform:translateX(-50%) translateY(6px)}22%{opacity:1; transform:translateX(-50%)}72%{opacity:1}86%,100%{opacity:0}}
  .ixp{width:180px; height:12px; border-radius:999px; background:var(--hair); overflow:hidden; margin:12px auto 0;}
  .ixp i{display:block; height:100%; border-radius:999px; background:linear-gradient(90deg,#FFB24D,var(--coral)); animation:ofill 3.8s ease-in-out infinite;}
  @keyframes ofill{0%{width:0}52%{width:100%}100%{width:100%}}
  .g2{animation:ogrow2 3.8s ease-in-out infinite;}
  @keyframes ogrow2{0%,52%{transform:scale(.82)}66%{transform:scale(1.2)}74%{transform:scale(1.08)}100%{transform:scale(1.08)}}
  .hat{position:absolute; top:6px; left:50%; font-size:36px; opacity:0; animation:ohat 3.8s ease-in-out infinite;}
  @keyframes ohat{0%,58%{opacity:0; transform:translate(-50%,-18px) rotate(-12deg)}72%{opacity:1; transform:translate(-50%,-2px) rotate(0)}100%{opacity:1; transform:translate(-50%,-2px)}}

  .sheet{position:fixed; inset:0; z-index:150; background:rgba(20,30,25,.42); display:none; align-items:flex-end; justify-content:center;}
  .sheet.on{display:flex;}
  .sheetbox{background:var(--card); width:100%; max-width:440px; border-radius:22px 22px 0 0; padding:20px 20px calc(24px + env(safe-area-inset-bottom)); animation:sheetup .3s ease;}
  @keyframes sheetup{from{transform:translateY(30px); opacity:.6;}to{transform:none; opacity:1;}}
  .sheet-h{font-size:16px; font-weight:800; margin-bottom:14px;}
  .sheet-in{display:flex; gap:8px;}
  .sheet-in input{flex:1; min-width:0; padding:12px 13px; border:1px solid var(--hair); border-radius:12px; font-family:inherit; font-size:14px; background:var(--ground); color:var(--ink); outline:none;}
  .sheet-in input:focus{border-color:var(--coral);}
  .sheet-in button{border:none; background:var(--coral); color:#fff; font-family:inherit; font-weight:800; font-size:14px; padding:0 18px; border-radius:12px; cursor:pointer;}
  .sheet-lbl{font-size:11.5px; color:var(--ink-soft); font-weight:700; margin:16px 0 9px;}
  .sheet-ex{display:flex; flex-wrap:wrap; gap:8px; max-height:180px; overflow-y:auto;}
  .exchip{background:var(--ground); border:1px solid var(--hair); border-radius:999px; padding:8px 13px; font-family:inherit; font-size:13px; font-weight:600; color:var(--ink); cursor:pointer; transition:transform .1s;}
  .exchip:active{transform:scale(.95);} .exchip.added{background:var(--did); border-color:var(--did); color:#fff;}
  .sheet-x{margin-top:18px; width:100%; padding:12px; border:none; background:var(--ground); color:var(--ink-soft); border-radius:12px; font-family:inherit; font-weight:700; font-size:14px; cursor:pointer;}
  .cloud-desc{ font-size:13px; color:var(--ink-soft); line-height:1.6; margin-bottom:16px; }
  .cbtn{ width:100%; padding:14px; border-radius:13px; border:none; font-family:inherit; font-size:14.5px; font-weight:800; cursor:pointer; background:var(--coral); color:#fff; margin-bottom:9px; }
  .cbtn:active{ transform:scale(.99); }
  .cbtn.ghost{ background:var(--ground); color:var(--ink); }
  .cbtn.warn{ background:transparent; color:var(--dont); font-size:13px; font-weight:700; margin-top:2px; }
  .cor{ text-align:center; color:var(--ink-soft); font-size:12px; margin:16px 0 10px; }
  .codebox{ text-align:center; background:var(--ground); border:1.5px dashed var(--coral); border-radius:14px; padding:18px; margin:2px 0 14px; }
  .codebox .c{ font-size:30px; font-weight:900; letter-spacing:6px; color:var(--coral); font-family:var(--num); }
  .codebox .t{ font-size:12px; color:var(--ink-soft); margin-top:8px; font-weight:700; line-height:1.5; }
  .cloudmsg{ font-size:13px; font-weight:700; margin-top:6px; min-height:18px; text-align:center; }
  .cloudmsg.ok{ color:var(--did); } .cloudmsg.err{ color:var(--dont); }
  .lvrow{ cursor:pointer; } .lvcards{ font-size:12px; opacity:.55; margin-left:2px; }
  .galhint{ font-size:13px; color:var(--ink-soft); line-height:1.6; margin-bottom:14px; }
  .gallery{ display:flex; gap:13px; overflow-x:auto; padding:6px 2px 12px; scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch; }
  .gallery::-webkit-scrollbar{ height:0; }
  .tcard{ flex:none; width:146px; scroll-snap-align:center; border-radius:16px; padding:13px 11px 15px; text-align:center; position:relative; background:linear-gradient(165deg,#2b2444,#1a1530); color:#F3E9D8; border:2px solid #C9A24B; box-shadow:0 10px 24px -12px rgba(0,0,0,.55); }
  .tcard .num{ font-family:Georgia,'Times New Roman',serif; font-size:13px; letter-spacing:3px; color:#E9C877; font-weight:800; }
  .tcard .fw{ height:104px; display:flex; align-items:center; justify-content:center; position:relative; margin:4px 0 6px; }
  .tcard .fw svg{ width:82px; height:82px; }
  .tcard .nm{ font-size:14.5px; font-weight:800; letter-spacing:-.01em; }
  .tcard .req{ font-size:11px; opacity:.82; margin-top:4px; min-height:15px; }
  .tcard.locked{ filter:grayscale(.75) brightness(.72); }
  .tcard.cur{ border-color:#FFD86B; box-shadow:0 0 0 2px #FFD86B, 0 12px 30px -8px rgba(255,180,60,.5); }
  .tcard .badge{ position:absolute; top:8px; right:9px; font-size:10.5px; font-weight:800; background:#C9A24B; color:#1a1530; padding:2px 7px; border-radius:999px; }
  .tcard.locked .badge{ background:rgba(255,255,255,.16); color:#F3E9D8; }
  .tcard .nowtag{ position:absolute; top:-9px; left:50%; transform:translateX(-50%); font-size:10px; font-weight:800; background:#FFD86B; color:#3a2a10; padding:2px 9px; border-radius:999px; white-space:nowrap; }
  .tacc{ position:absolute; left:50%; pointer-events:none; z-index:2; }
  .tacc.crown{ top:0; transform:translateX(-50%); font-size:30px; }
  .tacc.hat{ top:4px; transform:translateX(-50%); font-size:27px; }
  .tacc.bow{ top:6px; transform:translateX(-50%); font-size:22px; }
  .tacc.spark{ left:auto; right:20px; top:10px; font-size:18px; }
  .tacc.spark2{ left:20px; right:auto; top:22px; font-size:15px; }
</style>
