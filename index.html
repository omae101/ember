<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ember · 습관을 게임처럼</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#E7EDE6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Ember">
<link rel="icon" type="image/png" href="/icon-192.png">
<link rel="apple-touch-icon" href="/icon-192.png">
<style>
  :root{ --ground:#E7EDE6; --ground2:#DCE6DC; --card:#FCFDFB; --ink:#20302A; --ink-soft:#7C8D84; --hair:#D8E1D8; --coral:#FF6A3D;
    --font:"Apple SD Gothic Neo","Pretendard","Malgun Gothic",system-ui,sans-serif; }
  @media (prefers-color-scheme:dark){
    :root{ --ground:#14201A; --ground2:#1B291F; --card:#1C2620; --ink:#E9F0EA; --ink-soft:#93A69A; --hair:#2C3A30; --coral:#FF7A4D; } }
  *{ box-sizing:border-box; margin:0; padding:0; font-family:var(--font); -webkit-tap-highlight-color:transparent; }
  body{ background:radial-gradient(130% 55% at 50% 22%, var(--ground2), transparent 62%), var(--ground); color:var(--ink); min-height:100dvh; -webkit-font-smoothing:antialiased;
    display:flex; flex-direction:column; }
  .topr{ display:flex; justify-content:flex-end; padding:14px 18px 0; }
  .langsel{ border:1px solid var(--hair); background:var(--card); color:var(--ink-soft); font-family:inherit; font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer; }
  .wrap{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px 26px calc(40px + env(safe-area-inset-bottom)); max-width:440px; margin:0 auto; width:100%; }
  .flame{ width:170px; height:170px; animation:bob 3s ease-in-out infinite; filter:drop-shadow(0 16px 34px rgba(255,120,60,.42)); }
  @keyframes bob{ 0%,100%{transform:scale(1) translateY(0) rotate(-1deg);} 50%{transform:scale(1.05) translateY(-7px) rotate(1.5deg);} }
  .brand{ font-size:42px; font-weight:900; letter-spacing:-.03em; margin-top:8px; } .brand b{ color:var(--coral); }
  .lead{ font-size:18px; font-weight:800; letter-spacing:-.02em; margin-top:14px; line-height:1.45; color:var(--ink-soft); text-wrap:balance; } .lead b{ color:var(--coral); }
  .cta{ margin-top:34px; display:flex; flex-direction:column; gap:11px; width:100%; max-width:320px; }
  .btn{ display:block; width:100%; text-align:center; text-decoration:none; border:none; border-radius:16px; padding:17px; font-family:inherit; font-size:16px; font-weight:800; cursor:pointer; }
  .btn.go{ background:var(--coral); color:#fff; box-shadow:0 16px 32px -12px var(--coral); }
  .btn.go:active{ transform:translateY(1px); }
  .btn.inst{ background:var(--card); color:var(--coral); border:1.5px solid var(--coral); }
  @media (prefers-reduced-motion:reduce){ *{animation:none !important;} }
</style>
</head>
<body>
  <div class="topr"><select class="langsel" id="langSel"></select></div>
  <div class="wrap">
    <svg class="flame" viewBox="0 0 100 100" aria-label="Ember">
      <defs><radialGradient id="fg" cx="50%" cy="72%" r="70%"><stop offset="0" stop-color="#FFDF6B"/><stop offset="45%" stop-color="#FF9A3C"/><stop offset="100%" stop-color="#F0492A"/></radialGradient></defs>
      <path d="M50 12 C62 26 78 34 78 56 A28 22 0 0 1 22 56 C22 36 36 30 41 20 C45 30 43 40 50 40 C57 40 55 24 50 12 Z" fill="url(#fg)"/>
      <ellipse cx="42" cy="57" rx="4.8" ry="6" fill="#2E1A12"/><ellipse cx="58" cy="57" rx="4.8" ry="6" fill="#2E1A12"/>
      <circle cx="44" cy="54" r="2" fill="#fff"/><circle cx="60" cy="54" r="2" fill="#fff"/>
      <circle cx="33.5" cy="63" r="3" fill="#FF7A5A" opacity=".45"/><circle cx="66.5" cy="63" r="3" fill="#FF7A5A" opacity=".45"/>
      <path d="M43 64 Q50 73 57 64 Z" fill="#7A2A18"/>
    </svg>
    <div class="brand"><b>Ember</b></div>
    <div class="lead" id="lead"></div>
    <div class="cta">
      <a class="btn go" id="btnGo" href="/app.html?intro=1"></a>
      <a class="btn inst" id="btnInst" href="/install.html"></a>
    </div>
  </div>

<script>
  var T={
    ko:{ name:'한국어', lead:'습관을 <b>게임처럼</b> 🔥', go:'🔥 시작하기', inst:'📲 앱 다운받기' },
    en:{ name:'English', lead:'Habits, <b>like a game</b> 🔥', go:'🔥 Get started', inst:'📲 Download app' }
  };
  var LANG=(function(){ try{ var s=localStorage.getItem('ember_lang'); if(s&&T[s])return s; }catch(e){} return (navigator.language||'en').toLowerCase().indexOf('ko')===0?'ko':'en'; })();
  function $(id){ return document.getElementById(id); }
  function apply(){ var d=T[LANG]; document.documentElement.lang=LANG; $('lead').innerHTML=d.lead; $('btnGo').textContent=d.go; $('btnInst').textContent=d.inst; }
  (function(){
    var sel=$('langSel');
    for(var k in T){ var o=document.createElement('option'); o.value=k; o.textContent=T[k].name; if(k===LANG)o.selected=true; sel.appendChild(o); }
    sel.addEventListener('change',function(){ LANG=sel.value; try{localStorage.setItem('ember_lang',LANG);}catch(e){} apply(); });
    apply();
  })();
  if('serviceWorker' in navigator){ navigator.serviceWorker.register('/sw.js').catch(function(){}); }
</script>
</body>
</html>
